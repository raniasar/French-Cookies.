<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Message envoyé - French Cookies</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #f8f5f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 60px 50px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      animation: pop 0.5s 0.4s ease both;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #7b5e40;
      margin-bottom: 16px;
    }

    p {
      font-size: 17px;
      color: #2a1f1a;
      opacity: 0.75;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, #d1a36a, #e8b471);
      border-radius: 2px;
      margin: 24px auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
      padding: 16px 36px;
      background: linear-gradient(135deg, #d1a36a, #e8b471);
      color: #2a1f1a;
      font-weight: 700;
      font-size: 16px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(209,163,106,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(209,163,106,0.4);
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="icon">🍪</span>
    <h1>Message envoyé !</h1>
    <div class="divider"></div>
    <p>Merci de nous avoir contactés.</p>
    <p>Nous avons bien reçu votre message et nous vous répondrons dans les plus brefs délais.</p>
    <a href="https://raniasar.github.io/French-Cookies./index.html" class="btn">
      Retour à l'accueil →
    </a>
  </div>

</body>
</html>
